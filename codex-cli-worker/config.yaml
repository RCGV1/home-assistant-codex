name: Codex CLI Worker
description: Run Codex CLI tasks against the Home Assistant config folder.
version: "0.1.35"
slug: codex_cli_worker
url: https://github.com/moryoav/home-assistant-codex
image: ghcr.io/moryoav/codex-cli-worker
init: false
startup: services
boot: manual
stdin: true
ingress: true
ingress_port: 9123
panel_icon: mdi:robot
apparmor: true
arch:
  - aarch64
  - amd64
map:
  - type: homeassistant_config
    read_only: false
    path: /config
homeassistant_api: true
discovery:
  - codex_cli
options:
  codex_model: gpt-5.3-codex
  model_reasoning_effort: medium
  codex_sandbox: workspace-write
  task_root: /config/codex_tasks
  task_timeout_seconds: 3600
  auto_save_lovelace: true
  ha_url: http://supervisor/core
schema:
  codex_model: list(default|gpt-5.3-codex|gpt-5.5|gpt-5.5-pro|gpt-5.4|gpt-5.4-pro|gpt-5.4-mini|gpt-5-mini|gpt-5-nano|gpt-5|gpt-4.1)
  model_reasoning_effort: list(minimal|low|medium|high|xhigh)
  codex_sandbox: list(workspace-write|danger-full-access|read-only)
  task_root: str
  notify_service: str?
  task_timeout_seconds: int
  auto_save_lovelace: bool
  ha_url: str
  agents_md: str?
  HA_TOKEN: password?
