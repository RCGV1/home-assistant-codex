name: Bug report
description: Report a reproducible problem with Codex for Home Assistant.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, tokens, device codes, private URLs, and personal Home Assistant configuration before submitting.

  - type: input
    id: version
    attributes:
      label: Codex for Home Assistant version
      description: Include the integration version, worker app version, or commit if known.
      placeholder: "Example: integration 0.1.33, worker 0.1.33"
    validations:
      required: true

  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: "Example: 2026.5.4"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS custom integration and app/add-on repository
        - Manual custom integration install
        - Development branch
        - Other
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      options:
        - Worker app/add-on
        - Custom integration
        - Home Assistant actions/services
        - Config flow or setup
        - Entities or sensors
        - Ingress web UI
        - Codex sign-in
        - Task execution
        - Documentation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64
        - aarch64
        - Other
        - Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Go to ...
        2. Call action ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant Home Assistant or worker app logs after removing sensitive information.
      render: text

  - type: textarea
    id: extra_context
    attributes:
      label: Additional context
      description: Add screenshots, example YAML, or anything else that helps explain the issue.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I removed secrets, tokens, device codes, private URLs, and personal Home Assistant configuration.
          required: true
        - label: I checked the existing issues for a similar report.
          required: true
